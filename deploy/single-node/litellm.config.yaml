model_list:
  - model_name: __XLB_GATEWAY_MODEL__
    litellm_params:
      model: openai/__XLB_UPSTREAM_OPENAI_MODEL__
      api_base: os.environ/XLB_UPSTREAM_OPENAI_BASE_URL
      api_key: os.environ/XLB_UPSTREAM_OPENAI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  set_verbose: false

router_settings:
  routing_strategy: simple-shuffle
