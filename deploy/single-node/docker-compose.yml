services:
  caddy:
    image: caddy:2.10
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - kong

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3030:3030"
    env_file:
      - .env
    environment:
      PORT: 3030
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      ALIYUN_ECS_CONNECT_TIMEOUT_MS: 15000
      ALIYUN_ECS_READ_TIMEOUT_MS: 60000
      LITELLM_PROXY_URL: ${LITELLM_PROXY_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      XLB_API_PUBLIC_BASE_URL: ${XLB_API_PUBLIC_BASE_URL}
      XLB_GATEWAY_PUBLIC_BASE_URL: ${XLB_GATEWAY_PUBLIC_BASE_URL}
      XLB_GATEWAY_PROVIDER_ID: ${XLB_GATEWAY_PROVIDER_ID}
      XLB_GATEWAY_MODEL: ${XLB_GATEWAY_MODEL}
      XLB_GATEWAY_KEY_MAX_BUDGET: ${XLB_GATEWAY_KEY_MAX_BUDGET}
      XLB_BILLING_MARKUP_MULTIPLIER: ${XLB_BILLING_MARKUP_MULTIPLIER}
      XLB_BILLING_SYNC_INTERVAL_MS: ${XLB_BILLING_SYNC_INTERVAL_MS:-60000}
      XLB_BILLING_SYNC_LIMIT: ${XLB_BILLING_SYNC_LIMIT:-200}
      XLB_RUNTIME_DIST_DIR: /runtime-dist
      XLB_GATEWAY_TUNNEL_USER: ${XLB_GATEWAY_TUNNEL_USER:-xlb-tunnel}
      XLB_GATEWAY_TUNNEL_REMOTE_PORT: ${XLB_GATEWAY_TUNNEL_REMOTE_PORT:-8000}
      XLB_GATEWAY_TUNNEL_LOCAL_PORT: ${XLB_GATEWAY_TUNNEL_LOCAL_PORT:-43030}
      XLB_GATEWAY_TUNNEL_PRIVATE_KEY_PATH: /runtime-secrets/xlb-gateway-tunnel-client
    depends_on:
      - postgres
      - litellm
    volumes:
      - ../../runtime-dist:/runtime-dist:ro
      - ../../runtime-secrets:/runtime-secrets:ro

  kong:
    image: kong/kong-gateway:3.13.0.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000 reuseport backlog=16384
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: notice
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - litellm

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      STORE_MODEL_IN_DB: "true"
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
