global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: xiaolanbu-api
    metrics_path: /v1/metrics
    static_configs:
      - targets:
          - api:3030

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
